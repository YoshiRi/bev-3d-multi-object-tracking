<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEV 3D Multi-Object Tracking Demo</title>
  <style>
    /* ---- Reset & Base ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 { font-size: 1.1rem; color: #e6edf3; font-weight: 600; }
    header span { font-size: 0.82rem; color: #8b949e; }
    #status {
      margin-left: auto;
      font-size: 0.8rem;
      color: #58a6ff;
      font-family: monospace;
    }

    /* ---- Layout ---- */
    .layout {
      display: flex;
      gap: 0;
      height: calc(100vh - 49px);
    }

    /* ---- Controls panel ---- */
    .controls {
      width: 260px;
      min-width: 260px;
      background: #161b22;
      border-right: 1px solid #30363d;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .controls h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #8b949e;
      padding-bottom: 4px;
      border-bottom: 1px solid #21262d;
    }
    .param-group { display: flex; flex-direction: column; gap: 10px; }
    .param-row { display: flex; flex-direction: column; gap: 3px; }
    .param-row label {
      font-size: 0.78rem;
      color: #8b949e;
      display: flex;
      justify-content: space-between;
    }
    .param-row label span { color: #58a6ff; font-family: monospace; }
    .param-row input[type=range] {
      width: 100%;
      accent-color: #388bfd;
      cursor: pointer;
    }
    .param-row select {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    #run-btn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 0;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background .15s;
    }
    #run-btn:hover:not(:disabled) { background: #2ea043; }
    #run-btn:disabled { background: #21262d; color: #8b949e; cursor: default; }

    /* ---- Main area ---- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Canvas ---- */
    .canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      padding: 12px;
      overflow: hidden;
    }
    #bev-canvas {
      display: block;
      border-radius: 6px;
      border: 1px solid #21262d;
      max-width: 100%;
      max-height: 100%;
    }

    /* ---- Playback bar ---- */
    .playback {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .playback button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .playback button:hover { background: #30363d; }
    .playback input[type=range] {
      flex: 1;
      accent-color: #388bfd;
      cursor: pointer;
    }
    #frame-label {
      font-family: monospace;
      font-size: 0.8rem;
      color: #8b949e;
      min-width: 80px;
      text-align: right;
    }
    .playback select {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 5px;
      padding: 3px 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* ---- Metrics panel ---- */
    .metrics {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 10px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      align-items: center;
    }
    .metric-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 68px;
    }
    .metric-label {
      font-size: 0.68rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .metric-value {
      font-size: 1.05rem;
      font-weight: 700;
      font-family: monospace;
      color: #e6edf3;
    }
    .metric-value.good  { color: #3fb950; }
    .metric-value.warn  { color: #d29922; }
    .metric-value.info  { color: #58a6ff; }

    /* ---- Legend ---- */
    .legend {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: #8b949e;
    }
    .legend-swatch {
      width: 20px;
      height: 10px;
      border-radius: 2px;
      border: 2px solid;
    }
    .legend-swatch.gt      { border-color: #00e676; border-style: dashed; background: transparent; }
    .legend-swatch.conf    { border-color: hsl(200,75%,62%); background: transparent; }
    .legend-swatch.unconf  { border-color: hsl(200,40%,48%); border-style: dashed; background: transparent; }

    /* ---- Data source toggle ---- */
    .source-toggle {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .source-toggle label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.82rem;
      color: #c9d1d9;
      cursor: pointer;
    }
    .source-toggle input[type=radio] { accent-color: #388bfd; cursor: pointer; }

    /* ---- File input ---- */
    .file-label {
      display: block;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      text-align: center;
      transition: background .15s;
    }
    .file-label:hover { background: #30363d; }
    #kitti-file { display: none; }
    #kitti-filename {
      font-size: 0.72rem;
      color: #8b949e;
      font-family: monospace;
      margin-top: 5px;
      word-break: break-all;
      min-height: 1em;
    }
    .kitti-hint {
      font-size: 0.68rem;
      color: #6e7681;
      margin-top: 5px;
      line-height: 1.5;
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>BEV 3D Multi-Object Tracking</h1>
  <span>インタラクティブ・パラメータ調整デモ</span>
  <div id="status">Pyodide を読み込んでいます…</div>
</header>

<div class="layout">

  <!-- ===== Controls ===== -->
  <aside class="controls">

    <!-- Data source -->
    <div>
      <h2>データソース</h2>
      <div class="source-toggle">
        <label>
          <input type="radio" name="datasource" value="synthetic" checked> 合成データ
        </label>
        <label>
          <input type="radio" name="datasource" value="kitti"> KITTI ファイル
        </label>
      </div>
    </div>

    <!-- KITTI file input (hidden until selected) -->
    <div id="kitti-controls" style="display:none;">
      <h2>KITTI ラベルファイル</h2>
      <div style="margin-top:8px; display:flex; flex-direction:column; gap:6px;">
        <label class="file-label" for="kitti-file">📂 ファイルを選択</label>
        <input type="file" id="kitti-file" accept=".txt">
        <div id="kitti-filename">未選択</div>
        <p class="kitti-hint">
          KITTI Tracking Benchmark<br>
          training/label_02/*.txt<br>
          ※ファイルはブラウザ内でのみ処理
        </p>
      </div>
    </div>

    <!-- Synthetic scenario (shown by default) -->
    <div id="synthetic-controls">
      <h2>シナリオ</h2>
      <div class="param-group" style="margin-top:8px;">
        <div class="param-row">
          <label>シナリオ種類</label>
          <select id="p-scenario">
            <option value="highway">高速道路（直進 3 台）</option>
            <option value="intersection">交差点（右折・歩行者）</option>
            <option value="occlusion">遮蔽（低検出率）</option>
          </select>
        </div>
        <div class="param-row">
          <label>フレーム数 <span id="v-n-frames">60 f</span></label>
          <input type="range" id="p-n-frames" min="20" max="200" step="10" value="60">
        </div>
        <div class="param-row">
          <label>乱数シード <span id="v-seed">42</span></label>
          <input type="range" id="p-seed" min="0" max="99" step="1" value="42">
        </div>
      </div>
    </div>

    <div>
      <h2>トラッカー設定</h2>
      <div class="param-group" style="margin-top:8px;">
        <div class="param-row">
          <label>確定までのヒット数 <span id="v-min-hits">3</span></label>
          <input type="range" id="p-min-hits" min="1" max="10" step="1" value="3">
        </div>
        <div class="param-row">
          <label>消滅までのミス数 <span id="v-max-misses">5</span></label>
          <input type="range" id="p-max-misses" min="1" max="15" step="1" value="5">
        </div>
        <div class="param-row">
          <label>最大アソシエーション距離 <span id="v-max-dist">10 m</span></label>
          <input type="range" id="p-max-dist" min="1" max="30" step="0.5" value="10">
        </div>
      </div>
    </div>

    <div>
      <h2>検出ノイズ</h2>
      <div class="param-group" style="margin-top:8px;">
        <div class="param-row">
          <label>位置ノイズ σ <span id="v-noise">0.3 m</span></label>
          <input type="range" id="p-noise" min="0" max="3.0" step="0.1" value="0.3">
        </div>
        <div class="param-row">
          <label>検出率 <span id="v-det-rate">100%</span></label>
          <input type="range" id="p-det-rate" min="0.3" max="1.0" step="0.05" value="1.0">
        </div>
      </div>
    </div>

    <button id="run-btn" disabled>▶ シミュレーション実行</button>

    <!-- Legend -->
    <div>
      <h2 style="margin-bottom:8px;">凡例</h2>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-swatch gt"></div> 正解 GT
        </div>
        <div class="legend-item">
          <div class="legend-swatch conf"></div> 確定トラック
        </div>
        <div class="legend-item">
          <div class="legend-swatch unconf"></div> 未確定
        </div>
      </div>
    </div>

  </aside>

  <!-- ===== Main ===== -->
  <div class="main">

    <div class="canvas-wrap">
      <canvas id="bev-canvas" width="780" height="440"></canvas>
    </div>

    <!-- Playback -->
    <div class="playback">
      <button id="step-back-btn">◀◀</button>
      <button id="play-btn">▶ 再生</button>
      <button id="step-fwd-btn">▶▶</button>
      <input type="range" id="frame-slider" min="0" max="0" value="0">
      <span id="frame-label">— / —</span>
      <select id="speed-select" title="再生速度">
        <option value="5">0.5×</option>
        <option value="10" selected>1×</option>
        <option value="20">2×</option>
        <option value="50">5×</option>
      </select>
    </div>

    <!-- Metrics -->
    <div class="metrics">
      <div class="metric-item">
        <div class="metric-label">MOTA</div>
        <div class="metric-value good" id="m-mota">—</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">MOTP</div>
        <div class="metric-value info" id="m-motp">—</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">ID Switch</div>
        <div class="metric-value warn" id="m-idsw">—</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">Precision</div>
        <div class="metric-value" id="m-prec">—</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">Recall</div>
        <div class="metric-value" id="m-recall">—</div>
      </div>
      <div style="width:1px; background:#30363d; height:36px; margin:0 4px;"></div>
      <div class="metric-item">
        <div class="metric-label">TP</div>
        <div class="metric-value" id="m-tp">—</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">FP</div>
        <div class="metric-value" id="m-fp">—</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">FN</div>
        <div class="metric-value" id="m-fn">—</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">GT Total</div>
        <div class="metric-value" id="m-ngt">—</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">Frames</div>
        <div class="metric-value" id="m-nframes">—</div>
      </div>
    </div>

  </div><!-- .main -->
</div><!-- .layout -->

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script src="js/visualizer.js"></script>
<script src="js/app.js"></script>
</body>
</html>
